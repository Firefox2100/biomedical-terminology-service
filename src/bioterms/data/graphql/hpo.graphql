type HpoConcept implements Concept & OntologyConcept {
    prefix: ConceptPrefix!
    conceptId: String!
    label: String
    definition: String
    comment: String
    status: ConceptStatus!

    replaces: [HpoConcept!]!
    replacedBy: [HpoConcept!]!

    children: [HpoConcept!]!
    parents: [HpoConcept!]!

    similarConcepts(threshold: Float): [SimilarHpoConcept!]!
    pathsTo(
        targetPrefix: ConceptPrefix!
        targetConceptId: String!
        relationship: RelationshipType!
        direction: PathDirection = forward
        maxDepth: Int = 12
    ): [ConceptPath!]!
}

type SimilarHpoConcept implements SimilarConcept {
    from: HpoConcept!
    to: HpoConcept!
    score: Float!
}

type HpoConceptResponse {
    error: QueryError
    data: HpoConcept
}

type HpoConceptListResponse {
    error: QueryError
    data: [HpoConcept]
}

type HpoQuery {
    hpoConcept(conceptId: String!): HpoConceptResponse
    autoComplete(query: String!, limit: Int): HpoConceptListResponse
    search(query: String!, limit: Int): HpoConceptListResponse
}

extend type Query {
    hpo: HpoQuery
}
