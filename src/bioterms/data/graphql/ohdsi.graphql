type OhdsiConcept implements Concept & OntologyConcept {
    prefix: ConceptPrefix!
    conceptId: String!
    label: String
    synonyms: [String!]
    status: ConceptStatus!

    replaces: [Ctv3Concept!]!
    replacedBy: [Ctv3Concept!]!

    children: [Ctv3Concept!]!
    parents: [Ctv3Concept!]!

    similarConcepts(threshold: Float): [SimilarOhdsiConcept!]!
    pathsTo(
        targetPrefix: ConceptPrefix!
        targetConceptId: String!
        relationship: RelationshipType!
        direction: PathDirection = forward
        maxDepth: Int = 12
    ): [ConceptPath!]!
}

type SimilarOhdsiConcept implements SimilarConcept {
    from: OhdsiConcept!
    to: OhdsiConcept!
    score: Float!
}

type OhdsiConceptResponse {
    error: QueryError
    data: OhdsiConcept
}

type OhdsiConceptListResponse {
    error: QueryError
    data: [OhdsiConcept]
}

type OhdsiQuery {
    ohdsiConcept(conceptId: String!): OhdsiConceptResponse
    autoComplete(query: String!, limit: Int): OhdsiConceptListResponse
    search(query: String!, limit: Int): OhdsiConceptListResponse
}

extend type Query {
    ohdsi: OhdsiQuery
}
