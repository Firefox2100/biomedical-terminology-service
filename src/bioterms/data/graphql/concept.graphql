enum ConceptPrefix {
    ctv3
    ensembl
    gene
    hgnc
    hpo
    ncit
    omim
    ordo
    reactome
    snomed
}

enum ConceptStatus {
    active
    deprecated
    unknown
}

interface SimilarConcept {
    from: Concept!
    to: Concept!
    score: Float!
}

interface Concept {
    prefix: ConceptPrefix!
    conceptId: String
    label: String
    status: ConceptStatus!

    similarConcepts(threshold: Float): [SimilarConcept!]!
}

interface OntologyConcept {
    children: [Concept!]!
    parents: [Concept!]!
}

type QueryError {
  code: String!
  message: String!
}

type Query {
    loadedPrefixes: [ConceptPrefix!]!
}
